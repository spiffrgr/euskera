<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e63946">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Euskera">
  <title>Euskera Ikasi</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- SCREEN: loading -->
    <div id="screen-loading" class="screen active">
      <div class="loading-content">
        <div class="app-logo">🏔️</div>
        <h1>Euskera Ikasi</h1>
        <div class="spinner"></div>
      </div>
    </div>

    <!-- SCREEN: auth (login) -->
    <div id="screen-auth" class="screen">
      <div class="auth-content">
        <div class="app-logo">🏔️</div>
        <h1>Euskera Ikasi</h1>
        <input type="email" id="auth-email" class="auth-input" placeholder="Correo electrónico" autocomplete="email">
        <input type="password" id="auth-password" class="auth-input" placeholder="Contraseña" autocomplete="current-password">
        <div id="auth-error" class="auth-error"></div>
        <button id="btn-login" class="btn btn-primary" style="width:100%">Iniciar sesión</button>
        <p class="auth-switch">¿No tienes cuenta? <a id="link-to-register" class="auth-link">Regístrate</a></p>
      </div>
    </div>

    <!-- SCREEN: register -->
    <div id="screen-register" class="screen">
      <div class="auth-content">
        <div class="app-logo">🏔️</div>
        <h2>Crear cuenta</h2>
        <input type="email" id="reg-email" class="auth-input" placeholder="Correo electrónico" autocomplete="email">
        <input type="password" id="reg-password" class="auth-input" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password">
        <input type="password" id="reg-password-confirm" class="auth-input" placeholder="Confirmar contraseña" autocomplete="new-password">
        <div id="reg-error" class="auth-error"></div>
        <button id="btn-register" class="btn btn-primary" style="width:100%">Crear cuenta</button>
        <p class="auth-switch">¿Ya tienes cuenta? <a id="link-to-login" class="auth-link">Inicia sesión</a></p>
      </div>
    </div>

    <!-- SCREEN: home (unit map) -->
    <div id="screen-home" class="screen">
      <header class="app-header">
        <h1 class="app-title">Euskera Ikasi</h1>
        <div class="header-right">
          <div class="streak-badge" id="streak-display">
            <span class="streak-icon">🔥</span>
            <span class="streak-count" id="streak-count">0</span>
          </div>
          <button id="btn-logout" class="btn-logout" title="Cerrar sesión">↩</button>
        </div>
      </header>
      <div class="home-content">
        <div class="course-section">
          <h2 class="level-title">
            <span class="level-badge a1">A1</span>
            Principiante
          </h2>
          <div id="unit-map" class="topics-grid"></div>
        </div>
      </div>
    </div>

    <!-- SCREEN: unit (lesson list) -->
    <div id="screen-unit" class="screen">
      <header class="session-header">
        <button class="btn-back" id="btn-unit-back">←</button>
        <div class="session-info">
          <span id="unit-screen-title" class="session-title"></span>
        </div>
        <span id="unit-screen-emoji" style="font-size:1.5rem"></span>
      </header>
      <div id="lesson-list-container" class="lesson-list"></div>
    </div>

    <!-- SCREEN: lesson (slides) -->
    <div id="screen-lesson" class="screen">
      <header class="session-header">
        <button class="btn-back" id="btn-lesson-back">←</button>
        <div class="session-info">
          <span id="lesson-topic-title" class="session-title"></span>
          <div class="lesson-dots" id="lesson-dots"></div>
        </div>
        <span class="session-counter" id="lesson-counter">1/3</span>
      </header>
      <div class="lesson-slide-wrap" id="lesson-slide-wrap"></div>
      <div class="lesson-nav">
        <button class="btn btn-secondary lesson-skip" id="btn-lesson-skip">Saltar →</button>
        <button class="btn btn-primary" id="btn-lesson-next">Siguiente →</button>
      </div>
    </div>

    <!-- SCREEN: session (exercises) -->
    <div id="screen-session" class="screen">
      <header class="session-header">
        <button class="btn-back" id="btn-back">←</button>
        <div class="session-info">
          <span id="session-topic-title" class="session-title"></span>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="session-progress-bar"></div>
          </div>
        </div>
        <span class="session-counter" id="session-counter">1/10</span>
      </header>

      <div class="exercise-container" id="exercise-container"></div>
      <div class="answer-area" id="answer-area"></div>

      <div class="feedback-area hidden" id="feedback-area">
        <div class="feedback-content" id="feedback-content"></div>
        <button class="btn btn-primary btn-next" id="btn-next">Siguiente →</button>
      </div>
    </div>

    <!-- SCREEN: summary -->
    <div id="screen-summary" class="screen">
      <div class="summary-content">
        <div class="summary-icon" id="summary-icon">🎉</div>
        <h2 id="summary-title">¡Lección completada!</h2>
        <div class="summary-stats">
          <div class="stat-card">
            <span class="stat-value" id="stat-correct">0</span>
            <span class="stat-label">Correctas</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-wrong">0</span>
            <span class="stat-label">Errores</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-streak">0</span>
            <span class="stat-label">Racha 🔥</span>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-continue-unit" style="width:100%;margin-bottom:0.75rem">Siguiente lección →</button>
        <button class="btn btn-secondary" id="btn-home" style="width:100%">Volver al inicio</button>
      </div>
    </div>

  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/course.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
